<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="100%" height="100%">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" /> <stop offset="100%" stop-color="#0ea5e9" /> </linearGradient>

    <linearGradient id="rxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" /> <stop offset="100%" stop-color="#10b981" /> </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>

  <g transform="translate(15, 10)">
    <path 
      d="M 40 20 L 60 20 L 60 40 L 80 40 L 80 60 L 60 60 L 60 80 L 40 80 L 40 60 L 20 60 L 20 40 L 40 40 Z" 
      fill="url(#iconGrad)" 
      stroke="url(#iconGrad)" 
      stroke-width="12" 
      stroke-linejoin="round"
      filter="url(#shadow)"
    />

    <line x1="30" y1="50" x2="70" y2="50" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    <line x1="50" y1="30" x2="50" y2="70" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    
    <circle cx="50" cy="50" r="5" fill="#ffffff" />
    <circle cx="28" cy="50" r="2.5" fill="#ffffff" />
    <circle cx="72" cy="50" r="2.5" fill="#ffffff" />
    <circle cx="50" cy="28" r="2.5" fill="#ffffff" />
    <circle cx="50" cy="72" r="2.5" fill="#ffffff" />

    <polyline points="60,40 65,35 70,35" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" />
    <circle cx="72" cy="35" r="2" fill="#ffffff" />
    
    <polyline points="40,60 35,65 30,65" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" />
    <circle cx="28" cy="65" r="2" fill="#ffffff" />
  </g>

  <g transform="translate(130, 0)">
    <text x="0" y="72" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52">
      <tspan font-weight="800" fill="#0f172a">Data IT </tspan>
      <tspan font-weight="800" fill="url(#rxGrad)">Rx</tspan>
    </text>

    <text x="4" y="96" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#64748b" letter-spacing="4.5">
      PRESCRIPTION SOFTWARE
    </text>
  </g>
</svg>